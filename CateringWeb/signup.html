<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Royal Caterers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <header class="navbar">
        <div class="logo">Royal Caterers</div>
        <nav>
            <a href="index.html">Home</a>
            <div class="nav-dropdown">
                <a href="menu.html?event=Special Occasion" class="nav-dropdown-trigger">Menu &#9662;</a>
                <div class="nav-dropdown-menu">
                    <a href="menu.html?event=Special Occasion">Special Occasion (All)</a>
                    <a href="menu.html?event=Wedding">Wedding</a>
                    <a href="menu.html?event=Anniversary">Anniversary</a>
                    <a href="menu.html?event=Birthday">Birthday Party</a>
                    <a href="menu.html?event=Retirement">Retirement Party</a>
                    <a href="menu.html?event=Engagement">Engagement</a>
                </div>
            </div>
            <a href="booking.html">Book Event</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <span id="nav-user"></span>
        </nav>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">Royal Caterers</div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join us and start booking your events</p>

            <!-- STEP 1: Registration details -->
            <form class="auth-form" id="signupForm" onsubmit="return false">
                <div class="auth-field">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter your full name" required>
                </div>
                <div class="auth-field">
                    <label>Phone Number</label>
                    <input type="tel" id="signupPhone" placeholder="Enter 10-digit phone number" maxlength="10"
                        required>
                </div>
                <div class="auth-field">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email address" required>
                </div>
                <button type="button" id="registerBtn" class="auth-btn">Register &amp; Send OTP</button>
                <p id="signupMessage" style="font-size:13px; margin-top:8px;"></p>
            </form>

            <!-- STEP 2: OTP verification (hidden initially) -->
            <div id="otpSection" style="display:none;">
                <p class="auth-hint" id="otpHintText" style="margin-bottom:14px; font-size:13px; color:#555;"></p>
                <div class="auth-field">
                    <label>Enter OTP</label>
                    <input type="text" id="signupOtpInput" placeholder="Enter 6-digit OTP" maxlength="6">
                </div>
                <button type="button" id="verifySignupOtpBtn" class="auth-btn">Verify OTP &amp; Complete Signup</button>
                <button type="button" id="resendSignupOtpBtn"
                    style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:13px;margin-top:8px;display:block;">
                    Resend OTP
                </button>
                <p id="otpMessage" style="font-size:13px; margin-top:8px;"></p>
            </div>

            <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080/customer";

        // ── REGISTER & SEND OTP ───────────────────────────────────────────
        document.getElementById("registerBtn").addEventListener("click", async function () {
            const name = document.getElementById("signupName").value.trim();
            const phone = document.getElementById("signupPhone").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const msg = document.getElementById("signupMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (!name) { msg.textContent = "Please enter your full name."; return; }
            if (phone.length !== 10 || isNaN(phone)) { msg.textContent = "Enter a valid 10-digit phone number."; return; }
            if (!email.includes("@")) { msg.textContent = "Enter a valid email address."; return; }

            this.disabled = true;
            this.textContent = "Sending...";

            try {
                const res = await fetch(API + "/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, phone, email })
                });
                const text = await res.text();

                if (res.ok) {
                    document.getElementById("signupForm").style.display = "none";
                    document.getElementById("otpSection").style.display = "block";
                    document.getElementById("otpHintText").textContent =
                        "OTP sent to " + email + ". Enter it below to verify your account.";
                } else {
                    msg.textContent = text;
                    this.disabled = false;
                    this.textContent = "Register & Send OTP";
                }
            } catch (err) {
                msg.textContent = "Cannot reach server. Make sure backend is running.";
                this.disabled = false;
                this.textContent = "Register & Send OTP";
            }
        });

        // ── VERIFY OTP ────────────────────────────────────────────────────
        document.getElementById("verifySignupOtpBtn").addEventListener("click", async function () {
            const email = document.getElementById("signupEmail").value.trim();
            const otp = document.getElementById("signupOtpInput").value.trim();
            const msg = document.getElementById("otpMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (otp.length !== 6) { msg.textContent = "Enter the 6-digit OTP."; return; }

            this.disabled = true;
            this.textContent = "Verifying...";

            try {
                const res = await fetch(API + "/verify-signup-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp })
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem("loggedInCustomer", JSON.stringify(data));
                    alert("Welcome, " + data.name + "! Your account is verified.");
                    window.location.href = "index.html";
                } else {
                    const text = await res.text();
                    msg.textContent = text;
                    this.disabled = false;
                    this.textContent = "Verify OTP & Complete Signup";
                }
            } catch (err) {
                msg.textContent = "Cannot reach server. Make sure backend is running.";
                this.disabled = false;
                this.textContent = "Verify OTP & Complete Signup";
            }
        });

        // ── RESEND OTP ────────────────────────────────────────────────────
        document.getElementById("resendSignupOtpBtn").addEventListener("click", async function () {
            const phone = document.getElementById("signupPhone").value.trim();
            const msg = document.getElementById("otpMessage");
            this.disabled = true;
            this.textContent = "Resending...";

            try {
                const res = await fetch(API + "/resend-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone })
                });
                const text = await res.text();
                msg.style.color = res.ok ? "green" : "red";
                msg.textContent = text;
            } catch (err) {
                msg.style.color = "red";
                msg.textContent = "Cannot reach server.";
            }

            setTimeout(() => {
                this.disabled = false;
                this.textContent = "Resend OTP";
            }, 30000); // allow resend after 30s
        });
    </script>

    <script src="js/script.js"></script>
</body>

</html>
