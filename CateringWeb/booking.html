<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Event | Royal Caterers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Royal Caterers</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="booking.html">Book Event</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <section class="booking">
        <h2>Book Catering For Your Event</h2>

        <!-- ✅ onsubmit="return false" prevents default HTML form submission -->
        <form class="booking-form" id="bookingForm" onsubmit="return false">

            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label>Phone</label>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>

            <label>Event Type</label>
            <select id="eventType">
                <option>Wedding</option>
                <option>Birthday</option>
                <option>Corporate</option>
            </select>

            <label>Event Date</label>
            <input type="date" id="eventDate" required>

            <label>Number of Guests</label>
            <input type="number" id="guests" placeholder="Enter guest count">

            <button type="submit">Submit Booking</button>

        </form>
    </section>

    <!-- ✅ Script at the bottom so the form exists in DOM before JS runs -->
    <script>
        if (!sessionStorage.getItem("loggedInCustomer")) {
            alert("Please login to book an event.");
            window.location.href = "login.html";
        }
    </script>
    <script src="js/script.js"></script>

</body>

</html>
