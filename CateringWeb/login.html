<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Royal Caterers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <header class="navbar">
        <div class="logo">Royal Caterers</div>
        <nav>
            <a href="index.html">Home</a>
            <div class="nav-dropdown">
                <a href="menu.html?event=Special Occasion" class="nav-dropdown-trigger">Menu &#9662;</a>
                <div class="nav-dropdown-menu">
                    <a href="menu.html?event=Special Occasion">Special Occasion (All)</a>
                    <a href="menu.html?event=Wedding">Wedding</a>
                    <a href="menu.html?event=Anniversary">Anniversary</a>
                    <a href="menu.html?event=Birthday">Birthday Party</a>
                    <a href="menu.html?event=Retirement">Retirement Party</a>
                    <a href="menu.html?event=Engagement">Engagement</a>
                </div>
            </div>
            <a href="booking.html">Book Event</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <span id="nav-user"></span>
        </nav>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">Royal Caterers</div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Login to your account to continue</p>

            <form class="auth-form" id="loginForm" onsubmit="return false">

                <!-- STEP 1: Enter phone number -->
                <div class="auth-field">
                    <label>Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="Enter 10-digit phone number" maxlength="10" required>
                </div>

                <button type="button" id="sendOtpBtn" class="auth-btn">Send OTP</button>

                <!-- STEP 2: OTP input (hidden initially) -->
                <div id="otpSection" style="display:none; margin-top:16px;">
                    <p class="auth-hint" id="otpHintText" style="font-size:13px; color:#555; margin-bottom:10px;"></p>
                    <div class="auth-field">
                        <label>Enter OTP</label>
                        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
                    </div>
                    <button type="button" id="verifyOtpBtn" class="auth-btn">Verify OTP &amp; Login</button>
                    <button type="button" id="resendOtpBtn"
                        style="background:none;border:none;color:#c0392b;cursor:pointer;font-size:13px;margin-top:8px;display:block;">
                        Resend OTP
                    </button>
                </div>

                <p id="authMessage" style="font-size:13px; margin-top:8px;"></p>
            </form>

            <p class="auth-switch">New here? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080/customer";

        // ── SEND OTP ──────────────────────────────────────────────────────
        document.getElementById("sendOtpBtn").addEventListener("click", async function () {
            const phone = document.getElementById("loginPhone").value.trim();
            const msg = document.getElementById("authMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (phone.length !== 10 || isNaN(phone)) {
                msg.textContent = "Enter a valid 10-digit phone number.";
                return;
            }

            this.disabled = true;
            this.textContent = "Sending...";

            try {
                const res = await fetch(API + "/send-login-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone })
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("otpSection").style.display = "block";
                    document.getElementById("otpHintText").textContent =
                        "OTP sent to " + data.maskedEmail + ". Enter it below.";
                    msg.style.color = "green";
                    msg.textContent = data.message;
                    this.textContent = "OTP Sent ✓";
                } else {
                    const text = await res.text();
                    msg.textContent = text;
                    this.disabled = false;
                    this.textContent = "Send OTP";
                }
            } catch (err) {
                msg.textContent = "Cannot reach server. Make sure backend is running.";
                this.disabled = false;
                this.textContent = "Send OTP";
            }
        });

        // ── VERIFY OTP & LOGIN ────────────────────────────────────────────
        document.getElementById("verifyOtpBtn").addEventListener("click", async function () {
            const phone = document.getElementById("loginPhone").value.trim();
            const otp = document.getElementById("otpInput").value.trim();
            const msg = document.getElementById("authMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (otp.length !== 6) { msg.textContent = "Enter the 6-digit OTP."; return; }

            this.disabled = true;
            this.textContent = "Verifying...";

            try {
                const res = await fetch(API + "/verify-login-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, otp })
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem("loggedInCustomer", JSON.stringify(data));
                    alert("Welcome, " + data.name + "!");
                    const params = new URLSearchParams(window.location.search);
                    const returnUrl = params.get("returnUrl");
                    window.location.href = returnUrl ? decodeURIComponent(returnUrl) : "index.html";
                } else {
                    const text = await res.text();
                    msg.textContent = text;
                    this.disabled = false;
                    this.textContent = "Verify OTP & Login";
                }
            } catch (err) {
                msg.textContent = "Cannot reach server. Make sure backend is running.";
                this.disabled = false;
                this.textContent = "Verify OTP & Login";
            }
        });

        // ── RESEND OTP ────────────────────────────────────────────────────
        document.getElementById("resendOtpBtn").addEventListener("click", async function () {
            const phone = document.getElementById("loginPhone").value.trim();
            const msg = document.getElementById("authMessage");
            this.disabled = true;
            this.textContent = "Resending...";

            try {
                const res = await fetch(API + "/resend-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone })
                });
                const text = await res.text();
                msg.style.color = res.ok ? "green" : "red";
                msg.textContent = text;
            } catch (err) {
                msg.style.color = "red";
                msg.textContent = "Cannot reach server.";
            }

            setTimeout(() => {
                this.disabled = false;
                this.textContent = "Resend OTP";
            }, 30000); // allow resend after 30s
        });
    </script>

    <script src="js/script.js"></script>
</body>

</html>
