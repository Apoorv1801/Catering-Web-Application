<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Royal Caterers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .menu-page {
            display: flex;
            min-height: 100vh;
            background: #fafafa;
        }

        /* Sidebar */
        .menu-sidebar {
            width: 220px;
            background: #111;
            padding: 32px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .menu-sidebar h3 {
            color: #ff7e5f;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .sidebar-filter {
            display: block;
            padding: 11px 14px;
            color: #ccc;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 4px;
        }

        .sidebar-filter:hover {
            background: #222;
            color: white;
            transform: none;
        }

        .sidebar-filter.active {
            background: #ff7e5f;
            color: white;
        }

        /* Main menu area */
        .menu-main {
            flex: 1;
            padding: 40px 36px;
        }

        .menu-main h2 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #111;
        }

        .menu-main .menu-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 28px;
        }

        /* Event tabs */
        .event-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 32px;
            border-bottom: 2px solid #eee;
            padding-bottom: 16px;
        }

        .event-tab {
            padding: 9px 20px;
            border-radius: 24px;
            border: 2px solid #ddd;
            background: white;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            color: #555;
            font-weight: 500;
        }

        .event-tab:hover {
            border-color: #ff7e5f;
            color: #ff7e5f;
            transform: none;
        }

        .event-tab.active {
            background: #ff7e5f;
            border-color: #ff7e5f;
            color: white;
        }

        /* Food grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .menu-empty {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 15px;
        }

        .menu-empty span {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .menu-page {
                flex-direction: column;
            }

            .menu-sidebar {
                width: 100%;
                height: auto;
                position: static;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                padding: 16px;
            }

            .menu-sidebar h3 {
                width: 100%;
                margin-bottom: 8px;
            }

            .sidebar-filter {
                width: auto;
            }
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">Royal Caterers</div>
        <nav>
            <a href="index.html">Home</a>
            <div class="nav-dropdown">
                <a href="menu.html?event=Special Occasion" class="nav-dropdown-trigger">Menu ▾</a>
                <div class="nav-dropdown-menu">
                    <a href="menu.html?event=Wedding">Wedding</a>
                    <a href="menu.html?event=Anniversary">Anniversary</a>
                    <a href="menu.html?event=Birthday">Birthday Party</a>
                    <a href="menu.html?event=Retirement">Retirement Party</a>
                    <a href="menu.html?event=Engagement">Engagement</a>
                    <a href="menu.html?event=Special Occasion">Special Occasion</a>
                </div>
            </div>
            <a href="booking.html">Book Event</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <span id="nav-user"></span>
        </nav>
    </header>

    <div class="menu-page">

        <!-- Sidebar -->
        <aside class="menu-sidebar">
            <h3>Filter By</h3>
            <button class="sidebar-filter active" onclick="filterCategory('All', this)">All</button>
            <button class="sidebar-filter" onclick="filterCategory('Starter', this)">Starter</button>
            <button class="sidebar-filter" onclick="filterCategory('Main Course', this)">Main Course</button>
            <button class="sidebar-filter" onclick="filterCategory('Thali', this)">Thali</button>
            <button class="sidebar-filter" onclick="filterCategory('Dessert', this)">Dessert</button>
            <button class="sidebar-filter" onclick="filterCategory('Authentic Gujarati Food', this)">Authentic Gujarati
                Food</button>
            <button class="sidebar-filter" onclick="filterCategory('Beverages', this)">Beverages</button>
        </aside>

        <!-- Main content -->
        <div class="menu-main">

            <h2 id="menu-heading">Our Menu</h2>
            <p class="menu-subtitle" id="menu-subtitle">Explore our wide range of dishes crafted for your special
                occasion</p>

            <!-- Event tabs -->
            <div class="event-tabs">
                <button class="event-tab" data-event="Special Occasion"
                    onclick="switchEvent('Special Occasion', this)">All / Special Occasion</button>
                <button class="event-tab" data-event="Wedding" onclick="switchEvent('Wedding', this)">Wedding</button>
                <button class="event-tab" data-event="Anniversary"
                    onclick="switchEvent('Anniversary', this)">Anniversary</button>
                <button class="event-tab" data-event="Birthday" onclick="switchEvent('Birthday', this)">Birthday
                    Party</button>
                <button class="event-tab" data-event="Retirement" onclick="switchEvent('Retirement', this)">Retirement
                    Party</button>
                <button class="event-tab" data-event="Engagement"
                    onclick="switchEvent('Engagement', this)">Engagement</button>
            </div>

            <!-- Food grid -->
            <div class="menu-grid" id="menuGrid"></div>

        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        let allItems = [];
        let activeEvent = 'Special Occasion';
        let activeCategory = 'All';

        // Read ?event= from URL on load
        const urlParams = new URLSearchParams(window.location.search);
        const urlEvent = urlParams.get('event');

        async function initMenu() {
            try {
                const res = await fetch('http://localhost:8080/menu');
                allItems = await res.json();
                const startEvent = urlEvent || 'Special Occasion';
                setActiveTab(startEvent);
                renderMenu();
            } catch (err) {
                console.error('Menu load error:', err);
            }
        }

        function setActiveTab(event) {
            activeEvent = event;
            document.querySelectorAll('.event-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.event === event);
            });
            document.getElementById('menu-heading').textContent =
                event === 'Special Occasion' ? 'All Menu — Special Occasion' : event + ' Menu';
        }

        function switchEvent(event, btn) {
            activeEvent = event;
            document.querySelectorAll('.event-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('menu-heading').textContent =
                event === 'Special Occasion' ? 'All Menu — Special Occasion' : event + ' Menu';
            renderMenu();
        }

        function filterCategory(category, btn) {
            activeCategory = category;
            document.querySelectorAll('.sidebar-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            let filtered = allItems;

            // Event filter — Special Occasion shows all
            if (activeEvent !== 'Special Occasion') {
                filtered = filtered.filter(item =>
                    item.events && item.events.split(',').map(e => e.trim()).includes(activeEvent)
                );
            }

            // Category filter
            if (activeCategory !== 'All') {
                filtered = filtered.filter(item => item.category === activeCategory);
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                <div class="menu-empty">
                    <span>🍽️</span>
                    No items found for this selection.
                </div>`;
                return;
            }

            filtered.forEach(item => {
                grid.innerHTML += `
                <div class="food-card">
                    <img src="http://localhost:8080/${item.image}" onerror="this.src='images/default-food.jpg'">
                    <h3>${item.name}</h3>
                    <p>₹${item.price}</p>
                    <p style="font-size:13px;color:#666;padding:0 12px;">${item.description || ''}</p>
                    <button onclick="addToCart('${item.name}', ${item.price})">Add to Cart</button>
                </div>`;
            });
        }

        initMenu();
    </script>

</body>

</html>
