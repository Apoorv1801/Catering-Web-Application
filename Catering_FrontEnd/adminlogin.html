<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Royal Caterers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }

        .login-logo-icon {
            width: 48px;
            height: 48px;
            background: #ff7e5f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: white;
        }

        .login-logo-text {
            font-size: 18px;
            font-weight: 600;
            color: white;
            line-height: 1.2;
        }

        .login-logo-text span {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: #ff7e5f;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 {
            text-align: center;
            color: white;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 32px;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ff7e5f;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff7e5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #ff5733;
        }

        button:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-icon">RC</div>
            <div class="login-logo-text">
                Royal Caterers
                <span>Admin Panel</span>
            </div>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access the admin dashboard</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="adminLoginForm" onsubmit="return false">
            <label>Username</label>
            <input type="text" id="adminUsername" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" id="adminPassword" placeholder="Enter password" required>

            <button type="submit" id="loginBtn">Sign In</button>
        </form>
    </div>

    <script>
        // Redirect if already logged in
        if (sessionStorage.getItem("adminLoggedIn")) {
            window.location.href = "admin.html";
        }

        document.getElementById("adminLoginForm").addEventListener("submit", async function () {
            const username = document.getElementById("adminUsername").value.trim();
            const password = document.getElementById("adminPassword").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const loginBtn = document.getElementById("loginBtn");

            if (!username || !password) {
                errorMsg.textContent = "Please enter both username and password.";
                errorMsg.style.display = "block";
                return;
            }

            loginBtn.textContent = "Signing in...";
            loginBtn.disabled = true;
            errorMsg.style.display = "none";

            try {
                const res = await fetch("http://localhost:8080/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    sessionStorage.setItem("adminLoggedIn", "true");
                    window.location.href = "admin.html";
                } else {
                    const text = await res.text();
                    errorMsg.textContent = text;
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "Server error. Make sure Spring Boot is running.";
                errorMsg.style.display = "block";
            }

            loginBtn.textContent = "Sign In";
            loginBtn.disabled = false;
        });
    </script>

</body>

</html>
