<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Royal Caterers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <header class="navbar">
        <div class="logo">Royal Caterers</div>
        <nav>
            <a href="index.html">Home</a>
            <div class="nav-dropdown">
                <a href="menu.html?event=Special Occasion" class="nav-dropdown-trigger">Menu &#9662;</a>
                <div class="nav-dropdown-menu">
                    <a href="menu.html?event=Special Occasion">Special Occasion (All)</a>
                    <a href="menu.html?event=Wedding">Wedding</a>
                    <a href="menu.html?event=Anniversary">Anniversary</a>
                    <a href="menu.html?event=Birthday">Birthday Party</a>
                    <a href="menu.html?event=Retirement">Retirement Party</a>
                    <a href="menu.html?event=Engagement">Engagement</a>
                </div>
            </div>
            <a href="booking.html">Book Event</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <span id="nav-user"></span>
        </nav>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">Royal Caterers</div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Login to your account to continue</p>

            <form class="auth-form" id="loginForm" onsubmit="return false">
                <div class="auth-field">
                    <label>Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="Enter 10-digit phone number" maxlength="10" required>
                </div>

                <!-- Invisible reCAPTCHA required by Firebase -->
                <div id="recaptcha-container" style="margin-bottom: 14px;"></div>

                <button type="button" id="sendOtpBtn" class="auth-btn">Send OTP</button>

                <div id="otpSection" style="display:none;">
                    <div class="auth-field" style="margin-bottom:14px;">
                        <label>Enter OTP</label>
                        <p class="auth-hint">OTP sent to your mobile number via SMS</p>
                        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6">
                    </div>
                    <button type="button" id="verifyOtpBtn" class="auth-btn">Verify OTP &amp; Login</button>
                </div>

                <p id="authMessage" style="font-size:13px; margin-top:8px;"></p>
            </form>

            <p class="auth-switch">New here? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script>
        // ================================================================
        // FIREBASE CONFIG — Replace with YOUR values from Firebase Console
        // Go to: console.firebase.google.com → Your Project → Settings → General
        // ================================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let confirmationResult = null;

        // Invisible reCAPTCHA — required by Firebase Phone Auth
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            size: 'invisible',
            callback: () => { }
        });

        // ── SEND OTP ─────────────────────────────────────────────────────
        document.getElementById("sendOtpBtn").addEventListener("click", async function () {
            const phone = document.getElementById("loginPhone").value.trim();
            const msg = document.getElementById("authMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (phone.length !== 10 || isNaN(phone)) {
                msg.textContent = "Enter a valid 10-digit phone number.";
                return;
            }

            // Check phone is registered in backend before sending OTP
            try {
                const res = await fetch("http://localhost:8080/customer/check-phone", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone })
                });
                if (!res.ok) {
                    msg.textContent = "Phone number not registered. Please sign up first.";
                    return;
                }
            } catch (err) {
                msg.textContent = "Cannot reach server. Make sure backend is running.";
                return;
            }

            const phoneNumber = "+91" + phone;
            this.disabled = true;
            this.textContent = "Sending...";

            try {
                confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier);
                document.getElementById("otpSection").style.display = "block";
                msg.style.color = "green";
                msg.textContent = "OTP sent to " + phoneNumber;
                this.textContent = "OTP Sent ✓";
            } catch (err) {
                console.error(err);
                msg.style.color = "red";
                msg.textContent = "Failed to send OTP: " + err.message;
                this.disabled = false;
                this.textContent = "Send OTP";
            }
        });

        // ── VERIFY OTP & LOGIN ────────────────────────────────────────────
        document.getElementById("verifyOtpBtn").addEventListener("click", async function () {
            const otp = document.getElementById("otpInput").value.trim();
            const phone = document.getElementById("loginPhone").value.trim();
            const msg = document.getElementById("authMessage");
            msg.style.color = "red";
            msg.textContent = "";

            if (!otp || otp.length !== 6) {
                msg.textContent = "Enter the 6-digit OTP.";
                return;
            }
            if (!confirmationResult) {
                msg.textContent = "Please request an OTP first.";
                return;
            }

            this.disabled = true;
            this.textContent = "Verifying...";

            try {
                // Firebase verifies OTP — no backend needed for this step
                const result = await confirmationResult.confirm(otp);
                const firebaseUid = result.user.uid;

                // Notify backend to get customer session data
                const res = await fetch("http://localhost:8080/customer/firebase-login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, firebaseUid })
                });

                if (res.ok) {
                    const data = await res.json();
                    sessionStorage.setItem("loggedInCustomer", JSON.stringify(data));
                    alert("Welcome, " + data.name + "!");
                    const params = new URLSearchParams(window.location.search);
                    const returnUrl = params.get("returnUrl");
                    window.location.href = returnUrl ? decodeURIComponent(returnUrl) : "index.html";
                } else {
                    const text = await res.text();
                    msg.textContent = "Login error: " + text;
                    this.disabled = false;
                    this.textContent = "Verify OTP & Login";
                }
            } catch (err) {
                console.error(err);
                msg.textContent = "Invalid OTP. Please try again.";
                this.disabled = false;
                this.textContent = "Verify OTP & Login";
            }
        });
    </script>

    <script src="js/script.js"></script>
</body>

</html>
